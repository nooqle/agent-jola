services:
  agent-poppy:
    build:
      context: .
    image: agent-poppy:local
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      AGENT_POPPY_DATA_DIR: /app/data
      AGENT_POPPY_WEB_DIST: /app/apps/web/dist
      AGENT_POPPY_API_KEY: ${AGENT_POPPY_API_KEY:-agent-poppy-local-dev-key}
      AGENT_POPPY_ADMIN_KEY: ${AGENT_POPPY_ADMIN_KEY:-agent-poppy-local-admin-key}
      AGENT_POPPY_KEY_ISSUER_SECRET: ${AGENT_POPPY_KEY_ISSUER_SECRET:-agent-poppy-local-issuer-secret}
      AGENT_POPPY_QUOTAS: ${AGENT_POPPY_QUOTAS:-character_randomize=unlimited,room_create=unlimited,template_read=unlimited,template_apply=unlimited,bridge_prompt=unlimited}
    volumes:
      - agent-poppy-data:/app/data

volumes:
  agent-poppy-data:
